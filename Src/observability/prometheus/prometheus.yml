# ============================================================
# Prometheus Yapılandırması
#
# ShopSync servislerinden metrikleri çeken scrape ayarları.
# Her servis /metrics endpoint'i üzerinden Prometheus formatında
# metrik sunar (OpenTelemetry Prometheus Exporter).
# ============================================================

global:
  scrape_interval: 15s        # Her 15 saniyede bir metrik topla
  evaluation_interval: 15s    # Alert kurallarını her 15 saniyede değerlendir
  scrape_timeout: 10s         # Bir scrape 10 saniyede tamamlanmazsa timeout

# Alert kuralları dosyası
rule_files:
  - "alert_rules.yml"

# Scrape hedefleri
scrape_configs:

  # Prometheus'un kendisi (self-monitoring)
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # InventoryService metrikleri
  - job_name: "inventory-service"
    metrics_path: "/metrics"
    scrape_interval: 10s
    static_configs:
      - targets: ["host.docker.internal:5144"]
        labels:
          service: "inventory"
          environment: "development"

  # OrderService metrikleri
  - job_name: "order-service"
    metrics_path: "/metrics"
    scrape_interval: 10s
    static_configs:
      - targets: ["host.docker.internal:5160"]
        labels:
          service: "order"
          environment: "development"