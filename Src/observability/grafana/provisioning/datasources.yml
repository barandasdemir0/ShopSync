# ============================================================
# Grafana Datasource Provisioning
#
# Grafana açıldığında bu datasource'lar otomatik eklenir.
# Manuel ekleme gerekmez.
# ============================================================

apiVersion: 1

datasources:

  # Prometheus — Metrikler (Counter, Histogram, Gauge)
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"

  # Loki — Loglar (Serilog → Loki → Grafana)
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false

  # Jaeger — Trace'ler (OpenTelemetry → Jaeger → Grafana)
  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: false